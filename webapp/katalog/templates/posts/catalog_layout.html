{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Katalog{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css?family=Space+Grotesk:300,regular,500,600,700" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'main/css/main.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body class="catalog-page-body">
    <nav class="navbar navbar-expand-lg sticky-top custom-navbar" data-bs-theme="dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <i class="fa-solid fa-ghost"></i> Co Robimy Wieczorem?
            </a>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto gap-4">
                    <li class="nav-item">
                        <a class="nav-link custom-link" href="#">Wydarzenia</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link custom-link {% block katalog_nav_class %}active{% endblock %}" href="{% url 'posts:list' %}">Katalog</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link custom-link {% block forum_nav_class %}{% endblock %}" href="{% url 'community' %}">Społeczność</a>
                    </li>
                </ul>
            </div>

            <div class="d-flex gap-2">
                {% if request.user.is_authenticated %}
                    <a href="{% url 'profile_user' %}" class="btn-custom-outline text-decoration-none">Profil</a>
                    <a href="{% url 'logout_user' %}" class="btn-custom-outline text-decoration-none">Wyloguj</a>
                {% else %}
                    <a href="{% url 'login_user' %}" class="btn-custom-outline text-decoration-none">Zaloguj</a>
                    <a href="{% url 'register_user' %}" class="btn-custom-solid text-decoration-none">Rejestracja</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="catalog-page-main">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
